name: Validate GlobeHoppers Develop

on:
  push:
    branches:
      - develop
      - feature/account-travel-data
      - feature/timeline-ordering
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: ./journeylines

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_DEV }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY_DEV }}
      VITE_ENABLE_RLS_TEST_PANEL: "true"
      VITE_ENABLE_CLOUD_TRAVEL_DATA: "true"
      VITE_ENABLE_CLOUD_TRAVEL_WRITES: "true"
      VITE_ENABLE_CLOUD_HOPPER_WRITES: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify repository structure
        shell: bash
        run: |
          pwd
          ls -la
          test -f package.json
          test -f package-lock.json
          test -f vite.config.js || test -f vite.config.ts || test -f vite.config.mjs || test -f vite.config.cjs
          test -f src/repositories/createTravelRepository.js

      - name: Verify development environment variables
        shell: bash
        run: |
          test -n "$VITE_SUPABASE_URL" || { echo "::error::VITE_SUPABASE_URL_DEV is missing."; exit 1; }
          test -n "$VITE_SUPABASE_PUBLISHABLE_KEY" || { echo "::error::VITE_SUPABASE_PUBLISHABLE_KEY_DEV is missing."; exit 1; }

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: journeylines/package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Show runtime versions
        run: |
          node --version
          npm --version
          git --version

      - name: Check lockfile for inaccessible registries
        shell: bash
        run: |
          if grep -Ein "applied-caas|openai\.org|artifactory|localhost|127\.0\.0\.1" package-lock.json; then
            echo "::error::package-lock.json contains a private or inaccessible registry URL."
            exit 1
          fi

      - name: Verify npm registry connectivity
        shell: bash
        timeout-minutes: 2
        run: |
          npm config set registry https://registry.npmjs.org/
          npm ping --registry=https://registry.npmjs.org/
          curl --fail --show-error --silent --location --max-time 30 https://registry.npmjs.org/react/latest > /dev/null

      - name: Install dependencies
        shell: bash
        timeout-minutes: 15
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
          NPM_CONFIG_FETCH_RETRIES: "3"
          NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: "10000"
          NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: "60000"
          NPM_CONFIG_AUDIT: "false"
          NPM_CONFIG_FUND: "false"
        run: npm ci --no-audit --no-fund

      - name: Run available v8 verifications
        shell: bash
        run: |
          npm run verify:v8.1
          npm run verify:v8.2.4
          npm run verify:v8.2.5
          npm run verify:v8.2.8

      - name: Build GlobeHoppers
        shell: bash
        run: npm run build

      - name: Verify build output
        shell: bash
        run: |
          test -d dist
          test -f dist/index.html
          echo "GlobeHoppers timeline-ordering validation completed successfully."
